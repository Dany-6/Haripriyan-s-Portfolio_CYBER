<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haripriyan B A | Cybersecurity & Full-Stack Developer</title>
    <meta name="description" content="Haripriyan B A — Cybersecurity Intern & Full-Stack Developer. Interactive terminal portfolio showcasing security tools, projects, and expertise.">
    <meta name="keywords" content="Haripriyan, cybersecurity, full-stack developer, portfolio, penetration testing, Python, network security">
    <meta name="author" content="Haripriyan B A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background particle canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- CRT overlay -->
    <div class="crt-overlay"></div>

    <!-- Top status bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-dot online"></span>
            <span>HARIPRIYAN_OS v2.0.0</span>
        </div>
        <div class="status-center">
            <span id="current-time"></span>
        </div>
        <div class="status-right">
            <span class="status-tag">SECURE</span>
            <span class="status-tag accent">SSH</span>
        </div>
    </div>

    <!-- Main terminal -->
    <div class="terminal-window">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="btn-close"></span>
                <span class="btn-minimize"></span>
                <span class="btn-maximize"></span>
            </div>
            <div class="terminal-title">guest@haripriyan — bash — 120×40</div>
            <div class="terminal-tabs">
                <span class="tab active">Terminal</span>
            </div>
        </div>
        <div class="terminal-body" id="terminal-body">
            <div class="output" id="output"></div>
            <div class="input-line" id="input-line">
                <span class="prompt-user">guest</span><span class="prompt-at">@</span><span class="prompt-host">haripriyan</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span>
                <input type="text" id="command-input" class="command-input" autocomplete="off" spellcheck="false" autofocus>
                <span class="cursor-block" id="cursor-block"></span>
            </div>
        </div>
    </div>

    <!-- Quick-command hints -->
    <div class="hint-bar" id="hint-bar">
        <span class="hint-label">TRY:</span>
        <button class="hint-cmd" data-cmd="about">about</button>
        <button class="hint-cmd" data-cmd="experience">experience</button>
        <button class="hint-cmd" data-cmd="skills">skills</button>
        <button class="hint-cmd" data-cmd="projects">projects</button>
        <button class="hint-cmd" data-cmd="education">education</button>
        <button class="hint-cmd" data-cmd="certs">certs</button>
        <button class="hint-cmd" data-cmd="contact">contact</button>
        <button class="hint-cmd" data-cmd="resume">resume</button>
        <button class="hint-cmd" data-cmd="help">help</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
